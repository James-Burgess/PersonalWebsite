<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JimmyB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      padding: 0.35em 0.85em;
      border-radius: 6px;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #666;
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      color: #999;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .links a:hover { color: #ddd; }

    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.85); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <span class="tag">v5</span>
  <h1>Coming soon</h1>
  <p class="subtitle">
    <span class="pulse"></span>Building something new. Same domain, next chapter.
  </p>
  <div class="links">
    <a href="/archive/">View archive</a>
    <a href="https://github.com/James-Burgess">GitHub</a>
  </div>
</body>
</html>
